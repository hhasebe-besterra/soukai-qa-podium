function b64ToBytes(b64){
  const s = atob(b64);
  const bytes = new Uint8Array(s.length);
  for(let i=0;i<s.length;i++) bytes[i] = s.charCodeAt(i);
  return bytes;
}

      {name:"AES-GCM", iv: b64ToBytes(PAYLOAD.iv)}, key, b64ToBytes(PAYLOAD.ct)

    btn.textContent = "🔓 アクセス";

}
